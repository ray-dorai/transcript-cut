name: Build bundles

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  macos-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: bash build/build-macos.sh x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: TranscriptCut-macOS-x86_64
          path: dist/TranscriptCut-macOS-x86_64

  macos-arm:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: bash build/build-macos.sh arm64
      - uses: actions/upload-artifact@v4
        with:
          name: TranscriptCut-macOS-arm64
          path: dist/TranscriptCut-macOS-arm64

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install podman
        run: sudo apt-get update && sudo apt-get install -y podman
      - run: bash build/build-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: TranscriptCut-Linux-x86_64
          path: dist/TranscriptCut-Linux-x86_64
